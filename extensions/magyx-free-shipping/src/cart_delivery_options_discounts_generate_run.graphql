query RunInput {
  cart {
    deliveryGroups {
      id
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          components: metafield(namespace: "$app:magyx-bundle", key: "components") {
            value
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}
