query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      bundleId: attribute(key: "_magyx_bundle_id") {
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
          components: metafield(namespace: "$app:magyx-bundle", key: "components") {
            value
          }
        }
      }
    }
  }
  shop {
    config: metafield(namespace: "$app:magyx-bundle", key: "config") {
      value
    }
  }
}
